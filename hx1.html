<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>呼吸(节奏)放松法</title>
    <style>
        :root {
            --bg-color: #1a2634;
            --circle-inhale: #4ade80;
            --circle-hold: #fbbf24;
            --circle-exhale: #60a5fa;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-evenly; /* 均匀分配垂直剩余空间 */
            height: 100vh; /* 兜底 */
            height: 100dvh; /* 动态适配移动端视口高度，扣除工具栏 */
            box-sizing: border-box;
            padding: 20px; /* 减小四周留白 */
            overflow: hidden;
            user-select: none;
            -webkit-user-select: none;
        }

        /* 顶部信息 */
        .header {
            text-align: center;
            width: 100%;
        }
        h1 {
            font-size: 1.6rem; /* 稍微缩小以适配小屏 */
            margin: 0 0 8px 0;
            font-weight: 400;
            letter-spacing: 2px;
        }
        .counter {
            font-size: 1rem;
            color: #94a3b8;
        }

        /* 核心动画区域 */
        .container {
            position: relative;
            width: 280px; /* 缩小大圆，确保小屏幕手机也能完美显示 */
            height: 280px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 20px 0;
        }

        .circle-outer {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.03);
            border: 2px solid rgba(255, 255, 255, 0.1);
            position: absolute;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .circle-progress {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            background: var(--circle-inhale);
            transition: transform 0.5s linear, background-color 0.5s ease;
            box-shadow: 0 0 50px rgba(74, 222, 128, 0.3);
            transform: scale(1);
        }

        .text-guide {
            position: absolute;
            font-size: 2rem;
            font-weight: 500;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
            pointer-events: none;
            letter-spacing: 1px;
        }

        .time-left {
            position: absolute;
            bottom: 60px; /* 调整倒计时位置 */
            font-size: 1.3rem;
            color: rgba(255,255,255,0.5);
        }

        /* 底部控制区 */
        .controls {
            display: flex;
            gap: 15px;
            width: 100%;
            max-width: 280px;
        }

        button {
            flex: 1;
            padding: 14px 0;
            border: none;
            border-radius: 30px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            outline: none;
            -webkit-tap-highlight-color: transparent; /* 清除移动端点击蓝框 */
        }

        .btn-start {
            background-color: #ffffff;
            color: #1a2634;
        }

        .btn-start:active {
            background-color: #e2e8f0;
            transform: scale(0.98);
        }

        .btn-pause {
            background-color: rgba(255, 255, 255, 0.1);
            color: #ffffff;
            border: 1px solid rgba(255, 255, 255, 0.2);
            display: none;
        }

        .btn-pause:active {
            background-color: rgba(255, 255, 255, 0.2);
        }

        /* 屏幕常亮提示 */
        .wakelock-status {
            font-size: 0.75rem;
            color: #4ade80;
            margin-top: 6px;
            opacity: 0.7;
            height: 12px;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>呼吸法</h1>
        <div class="counter">完成次数: <span id="cycle-count">0</span></div>
        <div class="wakelock-status" id="wakelock-text"></div>
    </div>

    <div class="container">
        <div class="circle-outer"></div>
        <div class="circle-progress" id="ball"></div>
        <div class="text-guide" id="status-text">准备</div>
        <div class="time-left" id="timer-text"></div>
    </div>

    <div class="controls">
        <button class="btn-start" id="start-btn">开始放松</button>
        <button class="btn-pause" id="pause-btn">暂停</button>
    </div>

    <script>
        // JavaScript 逻辑保持原样
        const STATE_IDLE = 'IDLE';
        const STATE_INHALE = 'INHALE';
        const STATE_HOLD = 'HOLD';
        const STATE_EXHALE = 'EXHALE';

        const DURATIONS = {
            [STATE_INHALE]: 4,
            [STATE_HOLD]: 7,
            [STATE_EXHALE]: 8
        };

        const TEXTS = {
            [STATE_INHALE]: '吸气',
            [STATE_HOLD]: '保持',
            [STATE_EXHALE]: '呼气'
        };

        const COLORS = {
            [STATE_INHALE]: '#4ade80',
            [STATE_HOLD]: '#fbbf24',
            [STATE_EXHALE]: '#60a5fa'
        };

        let currentState = STATE_IDLE;
        let isPaused = false;
        let cycles = 0;
        let secondsLeft = 0;
        let timerInterval = null;
        let wakeLock = null;

        const ball = document.getElementById('ball');
        const statusText = document.getElementById('status-text');
        const timerText = document.getElementById('timer-text');
        const cycleCountText = document.getElementById('cycle-count');
        const startBtn = document.getElementById('start-btn');
        const pauseBtn = document.getElementById('pause-btn');
        const wakelockText = document.getElementById('wakelock-text');

        startBtn.addEventListener('click', () => {
            if (currentState === STATE_IDLE) {
                startSession();
            } else {
                resetSession();
            }
        });

        pauseBtn.addEventListener('click', () => {
            if (isPaused) {
                resumeSession();
            } else {
                pauseSession();
            }
        });

        function startSession() {
            currentState = STATE_INHALE;
            isPaused = false;
            secondsLeft = DURATIONS[currentState];
            
            startBtn.textContent = '重置';
            startBtn.style.backgroundColor = 'rgba(239, 68, 68, 0.2)';
            startBtn.style.color = '#ef4444';
            
            pauseBtn.style.display = 'block';
            pauseBtn.textContent = '暂停';

            requestWakeLock();
            updateUI();
            runTimer();
        }

        function pauseSession() {
            isPaused = true;
            clearInterval(timerInterval);
            pauseBtn.textContent = '继续';
            statusText.textContent = '已暂停';
            ball.style.transition = 'none';
        }

        function resumeSession() {
            isPaused = false;
            pauseBtn.textContent = '暂停';
            updateUI();
            runTimer();
        }

        function resetSession() {
            clearInterval(timerInterval);
            currentState = STATE_IDLE;
            isPaused = false;
            cycles = 0;
            
            cycleCountText.textContent = cycles;
            statusText.textContent = '准备';
            timerText.textContent = '';
            
            ball.style.transform = 'scale(1)';
            ball.style.backgroundColor = '#4ade80';
            ball.style.boxShadow = '0 0 50px rgba(74, 222, 128, 0.3)';
            
            startBtn.textContent = '开始放松';
            startBtn.style.backgroundColor = '#ffffff';
            startBtn.style.color = '#1a2634';
            
            pauseBtn.style.display = 'none';
            
            releaseWakeLock();
        }

        function runTimer() {
            clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                secondsLeft--;
                timerText.textContent = secondsLeft + 's';

                if (secondsLeft <= 0) {
                    if (currentState === STATE_INHALE) {
                        currentState = STATE_HOLD;
                    } else if (currentState === STATE_HOLD) {
                        currentState = STATE_EXHALE;
                    } else if (currentState === STATE_EXHALE) {
                        currentState = STATE_INHALE;
                        cycles++;
                        cycleCountText.textContent = cycles;
                    }
                    secondsLeft = DURATIONS[currentState];
                    updateUI();
                }
            }, 1000);
        }

        function updateUI() {
            statusText.textContent = TEXTS[currentState];
            timerText.textContent = secondsLeft + 's';
            ball.style.backgroundColor = COLORS[currentState];
            ball.style.boxShadow = `0 0 50px ${COLORS[currentState]}4d`;

            ball.style.transition = `transform ${secondsLeft}s linear, background-color 0.5s ease`;

            if (currentState === STATE_INHALE) {
                ball.style.transform = 'scale(2.2)';
            } else if (currentState === STATE_HOLD) {
                ball.style.transform = 'scale(2.2)';
            } else if (currentState === STATE_EXHALE) {
                ball.style.transform = 'scale(1)';
            }
        }

        async function requestWakeLock() {
            if ('wakeLock' in navigator) {
                try {
                    wakeLock = await navigator.wakeLock.request('screen');
                    wakelockText.textContent = '✦ 屏幕常亮已启用';
                    
                    wakeLock.addEventListener('release', () => {
                        if (currentState !== STATE_IDLE && !isPaused) {
                            requestWakeLock();
                        }
                    });
                } catch (err) {
                    wakelockText.textContent = '';
                    console.log(`Wake Lock 失败: ${err.name}, ${err.message}`);
                }
            } else {
                wakelockText.textContent = '提示：当前浏览器不支持自动常亮';
            }
        }

        function releaseWakeLock() {
            if (wakeLock !== null) {
                wakeLock.release();
                wakeLock = null;
            }
            wakelockText.textContent = '';
        }

        document.addEventListener('visibilitychange', async () => {
            if (wakeLock !== null && document.visibilityState === 'visible' && currentState !== STATE_IDLE && !isPaused) {
                requestWakeLock();
            }
        });
    </script>
</body>
</html>
